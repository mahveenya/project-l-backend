name: CI

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pokemon-api-backend:${{ github.ref_name }}

  dispatch-tests:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Send repository dispatch to test repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TEST_REPO_TOKEN }}" \
            https://api.github.com/repos/mahveenya/qa-pokemon-api-backend/dispatches \
            -d '{"event_type":"run-api-tests", "client_payload":{"branch":"${{ github.ref_name }}"}}'
